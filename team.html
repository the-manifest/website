<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — Manifest</title>
<link rel="icon" type="image/png" href="/favicon-dark.png" media="(prefers-color-scheme: light)">
<link rel="icon" type="image/png" href="/favicon-light.png" media="(prefers-color-scheme: dark)">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg-soft: #f5f5f5;
  --text: #111111;
  --text-body: #333333;
  --text-secondary: #555555;
  --text-muted: #888888;
  --border: #e0e0e0;
  --font: 'Lexend', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-weight: 400;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.container {
  max-width: 1040px;
  margin: 0 auto;
  padding: 0 28px;
}

/* ── Section title ── */
.section-title {
  font-size: clamp(1.35rem, 3vw, 2rem);
  font-weight: 600;
  line-height: 1.25;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 0;
}

/* ── Team ── */
#team {
  padding: 72px 0 80px;
}

.team-grid {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-top: 40px;
  width: 100%;
}

.team-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.team-card {
  width: 172px;
  text-align: center;
  padding: 16px 8px;
  background: var(--bg-soft);
  border-radius: 8px;
}

.team-avatar {
  width: 112px;
  height: 112px;
  border-radius: 50%;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 10px;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text-secondary);
  overflow: hidden;
}

.team-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.team-card h3 {
  font-size: 0.78rem;
  font-weight: 500;
  margin-bottom: 2px;
}

.team-card .role {
  font-size: 0.65rem;
  color: var(--text-muted);
  line-height: 1.4;
}

.linkedin-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 10px;
  color: #0077B5;
  font-size: 0.78rem;
  text-decoration: none;
  opacity: 0.8;
  transition: opacity 0.2s;
}
.linkedin-link:hover { opacity: 1; }

/* ── Join CTA ── */
.join-cta {
  text-align: center;
  margin-top: 56px;
}
.join-cta p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin: 0 0 14px;
}
.join-cta a {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
  font-size: 0.9rem;
  font-weight: 500;
  text-decoration: none;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
  transition: opacity 0.2s;
}
.join-cta a:hover { opacity: 0.6; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .team-row { gap: 10px; }
  .team-card { width: calc(50% - 5px); }
  .team-card h3 { font-size: 0.82rem; }
  .team-card .role { font-size: 0.68rem; }
}
</style>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<section id="team">
  <div class="container">
    <div style="text-align: center;">
      <h2 class="section-title">A Team Committed to European Safety &amp; Security</h2>
    </div>
    <div class="team-grid" id="team-grid"></div>
    <div class="join-cta">
      <p>Passionate about European defence and autonomous systems?</p>
      <a href="mailto:Hello@the-manifest.com">
        Join the team <span style="font-size: 1rem;">→</span>
      </a>
    </div>
  </div>
</section>

<script>
const LI_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" style="flex-shrink:0"><rect x="2" y="2" width="20" height="20" rx="4" fill="#0077B5"/><path d="M7 10h2v7H7zM8 9a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zM11 10h2v1h.03C13.4 10.4 14.2 10 15.2 10c2.1 0 2.8 1.4 2.8 3.2V17h-2v-3.5c0-.8-.3-1.5-1.1-1.5s-1.4.7-1.4 1.5V17h-2v-7z" fill="white"/></svg>`;

const TEAM = [
  { row: 1, img: 'assets/images/charles.jpg',      name: 'Charles-Henri',  role: 'CEO & Founder',      url: 'https://www.linkedin.com/in/charlesblanchet/' },
  { row: 1, img: 'assets/images/oussama.jpg',      name: 'Oussama',        role: 'Founding Engineer',  url: 'https://www.linkedin.com/in/oussamala/' },
  { row: 1, img: 'assets/images/clement.jpg',      name: 'Clément',        role: 'Founding Engineer',  url: 'https://www.linkedin.com/in/clement-guigon/' },
  { row: 1, img: 'assets/images/thomas.png',        name: 'Thomas',         role: 'Founding Engineer',  url: 'https://www.linkedin.com/in/thomas-bousquet/' },
  { row: 1, img: 'assets/images/nick.jpg',         name: 'Nick',           role: 'Financial Services', url: 'https://www.linkedin.com/in/maceynick/' },
  { row: 2, img: 'assets/images/christophe.jpg',   name: 'Christophe',     role: 'Advisor',            url: 'https://www.linkedin.com/in/christophe-camperi-ginestet-1b15932/' },
  { row: 2, img: 'assets/images/tom.jpg',          name: 'Tom',            role: 'Advisor & Investor', url: 'https://www.linkedin.com/in/tomspengler/' },
  { row: 2, img: 'assets/images/geoffrey.jpg',     name: 'Geoffrey',       role: 'Financial Advisor',  url: 'https://www.linkedin.com/in/geoffrey-laurendeau-10b78478/' },
  { row: 2, img: 'assets/images/christophe-2.png', name: 'Christophe',     role: 'Defence Advisor',    url: 'https://www.linkedin.com/in/christopheysewyn/?locale=en_US' },
  { row: 2, img: 'assets/images/jean-philippe.png',name: 'Jean-Philippe',  role: 'Defence Advisor',    url: 'https://www.linkedin.com/in/jean-philippe-de-hauteclocque-6ab700201/' },
];

function buildCard(m) {
  const avatarInner = m.img
    ? `<img src="${m.img}" alt="${m.name}" loading="lazy">`
    : m.name.charAt(0);
  return `<div class="team-card">
    <div class="team-avatar">${avatarInner}</div>
    <h3>${m.name}</h3>
    <div class="role">${m.role}</div>
    <a href="${m.url}" class="linkedin-link" target="_blank" rel="noopener">${LI_SVG}<span>LinkedIn</span></a>
  </div>`;
}

(function renderTeam() {
  const grid = document.getElementById('team-grid');
  if (!grid) return;
  const rows = [...new Set(TEAM.map(m => m.row))].sort();
  grid.innerHTML = rows.map(r => {
    const cards = TEAM.filter(m => m.row === r).map(buildCard).join('');
    return `<div class="team-row">${cards}</div>`;
  }).join('');
})();
</script>

</body>
</html>
